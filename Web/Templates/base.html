<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Auth UI{% endblock %}</title>
  <style>
    :root {
      --bg: #f3f5f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0b5fff;
      --danger: #dc2626;
      --line: #d1d5db;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(130deg, #eef2ff, #f8fafc 55%, #e2e8f0);
      color: var(--text);
      font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      min-height: 100vh;
    }
    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    .topbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .topbar a, .btn {
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.danger { background: var(--danger); border-color: var(--danger); color: #fff; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 6px 24px rgba(17, 24, 39, .08);
    }
    h1 { margin: 0 0 14px; font-size: 24px; }
    p.muted { color: var(--muted); margin-top: 0; }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.full { grid-column: 1 / -1; }
    label { font-size: 13px; color: var(--muted); }
    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
    }
    textarea { min-height: 90px; resize: vertical; }
    .actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    .status {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #f8fafc;
      font-size: 14px;
      display: none;
      white-space: pre-wrap;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 14px;
    }
    th, td { border-bottom: 1px solid var(--line); padding: 10px 8px; text-align: left; }
    @media (max-width: 720px) {
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="topbar">
      <a href="/api/v1/auth/">Логин</a>
      <a href="/api/v1/auth/register">Регистрация</a>
      <a href="/api/v1/auth/profile">Профиль</a>
      <a href="/api/v1/auth/admin">Админ</a>
    </nav>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
