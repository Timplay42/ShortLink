{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block content %}
<section class="card">
  <h1>Профиль</h1>
  <p class="muted">Редактирование текущего пользователя, logout и удаление аккаунта.</p>
  <form id="profile-form" class="form-grid">
    <input id="user-id" type="hidden" />
    <div class="field">
      <label for="name">Имя</label>
      <input id="name" name="name" />
    </div>
    <div class="field">
      <label for="lastname">Фамилия</label>
      <input id="lastname" name="lastname" />
    </div>
    <div class="field">
      <label for="username">Username</label>
      <input id="username" name="username" />
    </div>
    <div class="field">
      <label for="password">Новый пароль (опционально)</label>
      <input id="password" name="password" type="password" />
    </div>
    <div class="field full">
      <label for="description">Описание</label>
      <textarea id="description" name="description"></textarea>
    </div>
    <div class="actions full">
      <button class="btn primary" type="submit">Сохранить</button>
      <button class="btn" type="button" id="logout-btn">Выйти</button>
      <button class="btn danger" type="button" id="delete-btn">Удалить аккаунт</button>
    </div>
  </form>
  <div id="status" class="status"></div>
</section>

<script>
  const form = document.getElementById("profile-form");
  const statusEl = document.getElementById("status");
  const userIdInput = document.getElementById("user-id");

  function showStatus(text, isError = false) {
    statusEl.style.display = "block";
    statusEl.style.borderColor = isError ? "#fca5a5" : "#93c5fd";
    statusEl.style.background = isError ? "#fef2f2" : "#eff6ff";
    statusEl.textContent = text;
  }

  async function loadMe() {
    const response = await fetch("/api/v1/auth/me", { credentials: "include" });
    if (!response.ok) {
      showStatus("Сессия не найдена. Выполни вход.", true);
      setTimeout(() => window.location.href = "/api/v1/auth/", 600);
      return;
    }
    const me = await response.json();
    userIdInput.value = me.id;
    form.name.value = me.name ?? "";
    form.lastname.value = me.lastname ?? "";
    form.username.value = me.username ?? "";
    form.description.value = me.description ?? "";
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    const userId = userIdInput.value;
    if (!userId) return;

    const payload = {
      name: form.name.value.trim() || null,
      lastname: form.lastname.value.trim() || null,
      username: form.username.value.trim() || null,
      description: form.description.value.trim() || null,
    };
    if (form.password.value.trim()) {
      payload.password = form.password.value;
    }

    const response = await fetch(`/api/v1/users/${userId}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
      credentials: "include",
    });
    if (!response.ok) {
      showStatus(`Не удалось обновить профиль (${response.status})`, true);
      return;
    }
    form.password.value = "";
    showStatus("Профиль обновлён.");
  });

  document.getElementById("logout-btn").addEventListener("click", async () => {
    await fetch("/api/v1/auth/logout", { credentials: "include" });
    window.location.href = "/api/v1/auth/";
  });

  document.getElementById("delete-btn").addEventListener("click", async () => {
    const userId = userIdInput.value;
    if (!userId) return;
    if (!confirm("Удалить аккаунт?")) return;

    const response = await fetch(`/api/v1/users/${userId}`, {
      method: "DELETE",
      credentials: "include",
    });
    if (!response.ok) {
      showStatus(`Не удалось удалить аккаунт (${response.status})`, true);
      return;
    }
    await fetch("/api/v1/auth/logout", { credentials: "include" });
    window.location.href = "/api/v1/auth/";
  });

  loadMe();
</script>
{% endblock %}
